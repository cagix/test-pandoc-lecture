name: Handout (Docsify plus PDF)

on:
    push:
        # push on master branch
        branches: [master]
    # triggered manually
    workflow_dispatch:

env:
    MKTARGET: handout
    METADATA_FILE: cb.yaml
    BUILD_PATH: _handout

jobs:
    handout:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout lecture-repo
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Build handout
              uses: cagix/pandoc-lecture-zen@master
              with:
                  mktarget: ${{ env.MKTARGET }}
                  metadata: ${{ env.METADATA_FILE }}
                  output_dir: ${{ env.BUILD_PATH }}

            - name: Publish handout to orphan branch
              env:
                  COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
              run: |
                  git config user.name "cagix"
                  git config user.email "cagix@users.noreply.github.com"

                  if [ -z "${COMMIT_MESSAGE:-}" ]; then
                    COMMIT_MESSAGE="publish handout (manual trigger)"
                  fi

                  git reset --hard
                  git clean -fd -e "$BUILD_PATH"
                  git switch --orphan "$BUILD_PATH"

                  find . -mindepth 1 -maxdepth 1  \
                    ! -name '.git'                \
                    ! -name "$BUILD_PATH"         \
                    -exec rm -rf {} +

                  mv "$BUILD_PATH"/* .
                  rmdir "$BUILD_PATH" || true

                  git add -f .
                  git commit -m "$COMMIT_MESSAGE"
                  git push --force origin "$BUILD_PATH"
